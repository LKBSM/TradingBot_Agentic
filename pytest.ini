[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    live: hits live external services (skipped in CI via `-m "not live"`)
    benchmark: latency / runtime benchmarks (slow; opt-in via `-m benchmark`)
    slow: long-running tests (excluded from the fast CI lane)
    integration: cross-component tests needing local infra (excluded from the fast CI lane)
    skip_on_ci: depends on local-only assets (untracked CSVs, local models) — excluded on CI runners
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
