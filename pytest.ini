[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    live: hits live external services (skipped in CI via `-m "not live"`)
    benchmark: latency / runtime benchmarks (slow; opt-in via `-m benchmark`)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
