# =============================================================================
# DOCKER COMPOSE - Trading Bot Full Stack
# =============================================================================
# Includes:
# - Trading Bot application
# - Prometheus (metrics)
# - Grafana (dashboards)
# - Redis (caching)
# - PostgreSQL (optional, for audit logs)
#
# SECURITY: All passwords MUST be set via .env file. No defaults are provided
# for production credentials. Copy .env.example to .env and fill in values.
#
# Usage:
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Logs:    docker-compose logs -f trading-bot
#   Rebuild: docker-compose up -d --build
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # TRADING BOT - Main Application
  # ---------------------------------------------------------------------------
  trading-bot:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
      target: production
    container_name: trading-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # REST API - bound to localhost only
      - "127.0.0.1:9090:9090"   # Metrics  - bound to localhost only
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      # SECURITY FIX: DB_PASSWORD is REQUIRED (no default)
      - DATABASE_URL=postgresql://tradingbot:${DB_PASSWORD}@postgres:5432/tradingbot
      # API Keys (from .env file)
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
    volumes:
      - trading-data:/app/data
      - trading-logs:/app/logs
      - trading-models:/app/models
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ---------------------------------------------------------------------------
  # REDIS - Caching & Message Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    # SECURITY FIX: Do NOT expose Redis to host. Only accessible within Docker network.
    # If you need external access for debugging, uncomment the ports below temporarily.
    # ports:
    #   - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trading-network

  # ---------------------------------------------------------------------------
  # POSTGRESQL - Audit Logs & Historical Data
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    restart: unless-stopped
    # SECURITY FIX: Do NOT expose PostgreSQL to host. Only accessible within Docker network.
    # If you need external access for debugging, uncomment the ports below temporarily.
    # ports:
    #   - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=tradingbot
      # SECURITY FIX: DB_PASSWORD is REQUIRED (no insecure default)
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env file}
      - POSTGRES_DB=tradingbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingbot"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trading-network

  # ---------------------------------------------------------------------------
  # PROMETHEUS - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    restart: unless-stopped
    # SECURITY FIX: Bound to localhost only
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - trading-network

  # ---------------------------------------------------------------------------
  # GRAFANA - Dashboards & Visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    restart: unless-stopped
    # SECURITY FIX: Bound to localhost only
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # SECURITY FIX: GRAFANA_PASSWORD is REQUIRED (no insecure "admin" default)
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env file}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - trading-network

  # ---------------------------------------------------------------------------
  # ALERTMANAGER - Alert Routing
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: trading-alertmanager
    restart: unless-stopped
    # SECURITY FIX: Bound to localhost only
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - trading-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  trading-data:
    name: trading-bot-data
  trading-logs:
    name: trading-bot-logs
  trading-models:
    name: trading-bot-models
  redis-data:
    name: trading-redis-data
  postgres-data:
    name: trading-postgres-data
  prometheus-data:
    name: trading-prometheus-data
  grafana-data:
    name: trading-grafana-data
  alertmanager-data:
    name: trading-alertmanager-data

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  trading-network:
    name: trading-network
    driver: bridge
