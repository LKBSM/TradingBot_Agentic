# =============================================================================
# PROMETHEUS CONFIGURATION - Trading Bot Monitoring
# =============================================================================
# Metrics collection configuration for the trading bot
#
# Key metrics tracked:
# - Trading performance (PnL, Sharpe, drawdown)
# - System health (latency, errors, uptime)
# - Risk metrics (VaR, exposure, correlation)
# - News/data source health
# =============================================================================

global:
  scrape_interval: 15s      # How often to scrape targets
  evaluation_interval: 15s  # How often to evaluate rules
  scrape_timeout: 10s

  # Labels added to any time series or alerts
  external_labels:
    monitor: 'trading-bot'
    environment: 'production'

# =============================================================================
# ALERTMANAGER CONFIGURATION
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# =============================================================================
# RULE FILES
# =============================================================================
rule_files:
  - /etc/prometheus/alert-rules.yml

# =============================================================================
# SCRAPE CONFIGURATIONS
# =============================================================================
scrape_configs:
  # ---------------------------------------------------------------------------
  # PROMETHEUS SELF-MONITORING
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # TRADING BOT APPLICATION
  # ---------------------------------------------------------------------------
  - job_name: 'trading-bot'
    static_configs:
      - targets: ['trading-bot:9090']
    metrics_path: /metrics
    scrape_interval: 10s
    metric_relabel_configs:
      # Keep only relevant metrics to reduce cardinality
      - source_labels: [__name__]
        regex: 'trading_.*|system_.*|risk_.*|news_.*'
        action: keep

  # ---------------------------------------------------------------------------
  # TRADING BOT API
  # ---------------------------------------------------------------------------
  - job_name: 'trading-bot-api'
    static_configs:
      - targets: ['trading-bot:8080']
    metrics_path: /api/v1/metrics
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # REDIS
  # ---------------------------------------------------------------------------
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    # Note: Requires redis-exporter sidecar in production

  # ---------------------------------------------------------------------------
  # POSTGRESQL
  # ---------------------------------------------------------------------------
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: /metrics
    # Note: Requires postgres-exporter sidecar in production

